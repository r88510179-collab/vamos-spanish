<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B4332">
<title>¡Vamos! — Learn Spanish Together</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--g:#2D6A4F;--gd:#1B4332;--gl:#D8F3DC;--gb:#EFF8F1;--go:#F7B731;--gol:#FFF8E7;--god:#C78D1A;--sk:#219EBC;--sl:#D4F0FC;--sd:#0C6B8A;--co:#E76F51;--cl:#FDEBE6;--pu:#7C3AED;--pl:#EDE9FE;--sand:#FDFAF5;--w:#FFF;--ink:#1A1A2E;--gr:#6B7280;--gr2:#9CA3AF;--grl:#F3F4F6;--bd:#E5E7EB;--r:16px;--rs:10px;--sh:0 2px 8px rgba(0,0,0,.06);--shm:0 4px 12px rgba(0,0,0,.08);--shl:0 8px 30px rgba(0,0,0,.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Quicksand',sans-serif;background:var(--sand);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:78px;overflow-x:hidden;}
button{font-family:'Quicksand',sans-serif;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;}

.header{position:relative;overflow:hidden;background:linear-gradient(160deg,#1B4332 0%,#2D6A4F 45%,#40916C 100%);color:#fff;padding:calc(env(safe-area-inset-top,20px)+32px) 24px 68px;text-align:center;}
.header::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.03);top:-70px;right:-50px;}
.header::after{content:'';position:absolute;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.04);bottom:40px;left:-20px;}
.header h1{font-family:'Baloo 2',cursive;font-size:34px;font-weight:800;letter-spacing:-.3px;position:relative;z-index:4;line-height:1.1;text-shadow:0 2px 6px rgba(0,0,0,.15);}
.header p{font-family:'Quicksand',sans-serif;font-size:14px;opacity:1;position:relative;z-index:4;margin-top:10px;font-weight:700;letter-spacing:.3px;text-shadow:0 1px 4px rgba(0,0,0,.3);background:rgba(255,255,255,.12);display:inline-block;padding:4px 16px;border-radius:50px;backdrop-filter:blur(4px);}
.hwave{position:absolute;bottom:-1px;left:0;width:100%;z-index:3;}

.sbar{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 16px;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;}
.spill{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:50px;font-size:12.5px;font-weight:700;}
.sf{background:linear-gradient(135deg,#FFF1E6,#FFE0CC);color:#E8590C;}
.sw{background:var(--gl);color:var(--gd);}
.prm{position:relative;width:38px;height:38px;}
.prm svg{transform:rotate(-90deg);}
.prm .pp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--g);}

.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--w);border-top:1px solid var(--bd);display:flex;justify-content:space-around;padding:5px 0 max(5px,env(safe-area-inset-bottom));z-index:100;box-shadow:0 -3px 16px rgba(0,0,0,.05);}
.nb{display:flex;flex-direction:column;align-items:center;gap:1px;padding:7px 14px;background:none;font-size:10px;font-weight:600;color:var(--gr2);transition:color .2s;}
.nb svg{width:23px;height:23px;transition:transform .2s;}
.nb.act{color:var(--g);}
.nb.act svg{transform:scale(1.12);}
.nb .dt{width:4px;height:4px;border-radius:50%;background:var(--g);opacity:0;transition:opacity .2s;margin-top:1px;}
.nb.act .dt{opacity:1;}

.pg{display:none;padding:18px 16px 24px;max-width:600px;margin:0 auto;animation:fu .3s ease;}
.pg.act{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.pt{font-family:'Baloo 2',cursive;font-size:24px;font-weight:800;color:var(--gd);margin-bottom:4px;}
.ps{font-size:13px;color:var(--gr);margin-bottom:16px;}

.card{background:var(--w);border-radius:var(--r);padding:18px;margin-bottom:12px;border:1px solid var(--bd);box-shadow:var(--sh);position:relative;overflow:hidden;}
.card h3{font-size:15px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.card p,.card li{font-size:13px;color:#374151;}
.card ul{padding-left:16px;margin:6px 0;}
.card li{margin-bottom:4px;}
.hlg{border-left:4px solid var(--g);background:var(--gb);}
.hly{border-left:4px solid var(--go);background:var(--gol);}

/* Hero card */
.hc{background:linear-gradient(135deg,#1B4332,#2D6A4F 50%,#40916C);color:#fff;border-radius:var(--r);padding:22px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(27,67,50,.3);}
.hc::before{content:'';position:absolute;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.04);top:-35px;right:-25px;}
.hc h2{font-family:'Baloo 2',cursive;font-size:24px;font-weight:800;position:relative;z-index:1;}
.hc .dt2{font-size:13px;opacity:.7;position:relative;z-index:1;}
.hc .mot{font-size:13px;margin-top:12px;padding:10px 14px;background:rgba(255,255,255,.1);border-radius:var(--rs);font-style:italic;line-height:1.5;position:relative;z-index:1;}

/* Progress ring */
.rc{display:flex;flex-direction:column;align-items:center;margin:6px 0 16px;}
.rw{position:relative;width:120px;height:120px;}
.rw svg{transform:rotate(-90deg);width:120px;height:120px;}
.rcn{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.rpct{font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:var(--gd);}
.rlb{font-size:10px;color:var(--gr);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.rcp{font-size:12px;color:var(--gr);margin-top:6px;font-weight:600;}

/* Stats */
.srow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.sc2{background:var(--w);border-radius:var(--r);padding:14px 6px;text-align:center;border:1px solid var(--bd);box-shadow:var(--sh);}
.si{margin-bottom:2px;}
.sn{font-family:'Playfair Display',serif;font-size:20px;font-weight:800;}
.sn.cg{color:var(--g);}.sn.cy{color:var(--god);}.sn.cc{color:var(--co);}.sn.cs{color:var(--sk);}
.sl2{font-size:9px;color:var(--gr);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}

/* Checklist */
.cls{background:var(--w);border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;margin-bottom:16px;box-shadow:var(--sh);}
.clh{padding:13px 16px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd);}
.clc{font-size:11px;color:var(--gr);font-weight:600;background:var(--grl);padding:2px 8px;border-radius:50px;}
.ci{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid #F9FAFB;cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .15s;}
.ci:active{background:#F3FAF5;}
.ci:last-child{border-bottom:none;}
.cb{width:24px;height:24px;border:2px solid var(--bd);border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .25s;margin-top:1px;}
.ci.dn .cb{background:var(--g);border-color:var(--g);}
.ci.dn .cb svg{opacity:1;transform:scale(1);}
.cb svg{opacity:0;transform:scale(.5);transition:all .25s;width:14px;height:14px;}
.ci.dn .ct{text-decoration:line-through;color:var(--gr2);}
.ct{font-size:14px;font-weight:600;}
.csub{font-size:11px;color:var(--gr);font-weight:600;margin-top:2px;display:flex;align-items:center;gap:6px;}
.ci-detail{font-size:12.5px;color:#374151;line-height:1.6;margin-top:8px;padding:10px 12px;background:var(--gb);border-radius:var(--rs);border:1px solid #D1E7DD;display:none;}
.ci.exp .ci-detail{display:block;animation:fu .25s ease;}
.ci-expand{color:var(--g);font-size:11px;font-weight:700;margin-top:3px;cursor:pointer;}
.ci-body{flex:1;cursor:pointer;}
.wb{font-size:9px;font-weight:700;padding:2px 7px;border-radius:50px;text-transform:uppercase;letter-spacing:.3px;}
.wt{background:var(--pl);color:var(--pu);}.ws2{background:var(--sl);color:var(--sd);}

/* Phase cards */
.pc{background:var(--w);border-radius:var(--r);border:1px solid var(--bd);margin-bottom:12px;overflow:hidden;box-shadow:var(--sh);}
.ph{padding:16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;-webkit-user-select:none;}
.ph h3{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.ptg{font-size:10px;font-weight:700;padding:3px 9px;border-radius:50px;text-transform:uppercase;letter-spacing:.4px;}
.t1{background:var(--gl);color:var(--gd);}.t2{background:var(--sl);color:var(--sd);}.t3{background:var(--gol);color:var(--god);}.t4{background:var(--cl);color:#C4533D;}
.pch{color:var(--gr2);transition:transform .3s;}
.pc.op .pch{transform:rotate(180deg);}
.pbd{max-height:0;overflow:hidden;transition:max-height .5s ease;}
.pc.op .pbd{max-height:15000px;}
.pct2{padding:0 16px 16px;border-top:1px solid var(--bd);}
.mt{margin-top:16px;font-size:14.5px;font-weight:700;}
.wk{margin-top:10px;background:var(--grl);border-radius:var(--rs);padding:14px;}
.wk h4{font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.wkc{width:22px;height:22px;border:2px solid var(--bd);border-radius:6px;background:var(--w);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0;}
.wkc.dn{background:var(--g);border-color:var(--g);}
.wkc svg{width:12px;height:12px;opacity:0;transform:scale(.5);transition:all .25s;}
.wkc.dn svg{opacity:1;transform:scale(1);}
.wk p,.wk li{font-size:12px;color:#374151;}
.wk ul{padding-left:14px;margin-top:5px;}
.wk li{margin-bottom:3px;}
.tbx{background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--rs);padding:8px 10px;font-size:12px;margin-top:8px;display:flex;gap:6px;align-items:flex-start;}

/* Speak buttons */
.spk{display:inline-flex;align-items:center;gap:3px;background:var(--gl);border:1px solid #B7E4C7;color:var(--gd);padding:2px 7px 2px 5px;border-radius:50px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;vertical-align:middle;}
.spk:active{transform:scale(.92);}
.spk svg{width:13px;height:13px;}
.splg{width:48px;height:48px;border-radius:50%;border:2px solid var(--g);background:var(--gl);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;box-shadow:var(--sh);}
.splg:active{transform:scale(.9);}
.splg svg{width:20px;height:20px;color:var(--gd);}

/* Flashcards */
.dkp{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.dkb{padding:7px 12px;border-radius:50px;border:2px solid var(--bd);background:var(--w);font-size:12px;font-weight:600;transition:all .2s;}
.dkb.act{background:var(--g);color:#fff;border-color:var(--g);box-shadow:0 2px 8px rgba(45,106,79,.3);}
.fca{display:flex;flex-direction:column;align-items:center;margin:12px 0;}
.fcc{width:100%;max-width:320px;height:210px;perspective:1000px;cursor:pointer;margin-bottom:12px;}
.fc{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.2,.2,1);}
.fc.fl{transform:rotateY(180deg);}
.ff{position:absolute;inset:0;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;padding:24px;text-align:center;}
.ffr{background:linear-gradient(145deg,#1B4332,#2D6A4F 40%,#40916C);color:#fff;box-shadow:var(--shl);overflow:hidden;}
.ffr::before{content:'';position:absolute;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.04);top:-50px;right:-50px;}
.ffr .fw{font-family:'Baloo 2',cursive;font-size:32px;font-weight:800;position:relative;z-index:1;}
.ffr .fh{font-size:12px;opacity:.55;margin-top:10px;position:relative;z-index:1;}
.fbk{background:var(--w);border:2px solid var(--g);transform:rotateY(180deg);box-shadow:var(--shl);}
.fbk .fw{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--gd);}
.fbk .ft{font-size:15px;color:var(--gr);margin-top:4px;font-weight:600;}
.fbk .fe{font-size:12px;color:var(--ink);margin-top:12px;font-style:italic;padding-top:12px;border-top:1px solid var(--bd);line-height:1.5;}
.fcl{display:flex;gap:10px;margin-top:14px;}
.fcb{padding:12px 26px;border-radius:50px;font-size:13px;font-weight:700;transition:all .15s;box-shadow:var(--sh);}
.fcb:active{transform:scale(.94);}
.bk{background:var(--g);color:#fff;}.ba{background:var(--cl);color:var(--co);}
.fpg{text-align:center;font-size:12px;color:var(--gr);font-weight:600;margin-bottom:6px;}
.fsc{display:flex;gap:14px;justify-content:center;font-size:12px;font-weight:700;margin-bottom:10px;}
.fsk{color:var(--g);}.fsa{color:var(--co);}

/* Quiz */
.qc2{background:var(--w);border-radius:var(--r);padding:24px;border:1px solid var(--bd);text-align:center;margin-bottom:16px;box-shadow:var(--sh);}
.ql{font-size:13px;color:var(--gr);font-weight:600;margin-bottom:4px;}
.qw{font-family:'Baloo 2',cursive;font-size:30px;font-weight:800;color:var(--gd);margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:8px;}
.qo{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.qob{padding:14px 10px;border-radius:var(--rs);border:2px solid var(--bd);background:var(--w);font-size:14px;font-weight:600;transition:all .2s;box-shadow:var(--sh);}
.qob:active{transform:scale(.97);}
.qob.ok{border-color:var(--g);background:var(--gl);color:var(--gd);animation:pop .3s ease;}
.qob.no{border-color:var(--co);background:var(--cl);color:var(--co);animation:shk .35s ease;}
@keyframes pop{50%{transform:scale(1.05)}}
@keyframes shk{20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.qr{background:var(--w);border-radius:var(--r);padding:30px;text-align:center;border:1px solid var(--bd);box-shadow:var(--sh);}
.qr h2{font-family:'Baloo 2',cursive;font-size:24px;color:var(--gd);}
.qbg{font-family:'Playfair Display',serif;font-size:52px;font-weight:900;color:var(--g);margin:8px 0;}
.qrb{padding:12px 32px;border-radius:50px;background:var(--g);color:#fff;font-size:15px;font-weight:700;margin-top:14px;box-shadow:0 4px 12px rgba(45,106,79,.3);}
.qrb:active{transform:scale(.95);}
.qpb{width:100%;height:6px;background:var(--grl);border-radius:3px;overflow:hidden;margin-top:4px;}
.qpf{height:100%;background:linear-gradient(90deg,var(--g),var(--go));border-radius:3px;transition:width .4s ease;}

/* More page */
.stb{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.st{padding:7px 12px;border-radius:50px;border:2px solid var(--bd);background:var(--w);font-size:12px;font-weight:600;transition:all .2s;}
.st.act{background:var(--g);color:#fff;border-color:var(--g);}
.msec{display:none;animation:fu .25s ease;}
.msec.act{display:block;}

.sbl{background:var(--w);border-radius:var(--r);border:1px solid var(--bd);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh);}
.sbh{padding:11px 16px;font-weight:700;font-size:13px;background:var(--gb);border-bottom:1px solid var(--bd);}
.sr{display:flex;gap:10px;padding:9px 16px;border-bottom:1px solid #F9FAFB;align-items:flex-start;}
.sr:last-child{border-bottom:none;}
.stm{font-size:11px;font-weight:700;color:var(--g);min-width:48px;flex-shrink:0;margin-top:2px;}
.sac{font-size:12px;flex:1;}
.sdr{font-size:10px;color:var(--gr);font-weight:700;flex-shrink:0;background:var(--grl);padding:2px 6px;border-radius:50px;margin-top:2px;}

.rg{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:16px;}
.ri{background:var(--w);border-radius:var(--rs);padding:12px 14px;border:1px solid var(--bd);display:flex;gap:10px;align-items:flex-start;}
.ric{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;}
.rn{font-weight:700;font-size:13px;}
.rd{font-size:11px;color:var(--gr);line-height:1.5;}

.vp{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--grl);align-items:center;}
.vp:last-child{border-bottom:none;}
.ve{font-weight:700;color:var(--gd);font-size:14px;display:flex;align-items:center;gap:4px;}
.vn{color:var(--gr);font-size:12px;text-align:right;max-width:50%;}

@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.fa{animation:pulse 2s ease-in-out infinite;}
@media(max-width:380px){.srow{grid-template-columns:repeat(2,1fr);}.qo{grid-template-columns:1fr;}.sn{font-size:17px;}}
</style>
</head>
<body>

<symbol id="is" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></symbol>

function tW(k){S.wd[k]=!S.wd[k];sv();rL();rH();}

// CARDS
let cD="Greetings",cI=0,dk=[],fK=0,fA=0,fl=false;
function sD(n){cD=n;dk=sh([...V[n]]);cI=0;fK=0;fA=0;fl=false;rC();}
function rC(){const ds=Object.keys(V);let h=`<div class="pt">🃏 Flashcards</div><p class="ps">Tap to flip · 🔊 for pronunciation</p><div class="dkp">${ds.map(d=>`<button class="dkb ${d===cD?'act':''}" onclick="sD('${d}')">${d}</button>`).join('')}</div>`;
if(!dk.length){sD(cD);return;}
if(cI>=dk.length){h+=`<div class="qr"><svg width="44" height="44"><use href="#iy" style="color:var(--go)"/></svg><h2 style="margin-top:8px">Deck Complete!</h2><div class="qbg">${fK}/${dk.length}</div><p style="color:var(--gr);font-size:13px">Know: <b style="color:var(--g)">${fK}</b> · Again: <b style="color:var(--co)">${fA}</b></p><button class="qrb" onclick="sD('${cD}')">Shuffle & Retry</button></div>`;document.getElementById('p-cards').innerHTML=h;return;}
const c=dk[cI];h+=`<div class="fpg">${cI+1} of ${dk.length}</div><div class="fsc"><span class="fsk">✓ ${fK}</span><span class="fsa">✗ ${fA}</span></div><div class="fca"><div class="fcc" onclick="fl=!fl;rC()"><div class="fc ${fl?'fl':''}"><div class="ff ffr"><div class="fw">${c.e}</div><div class="fh">Tap to reveal</div></div><div class="ff fbk"><div class="fw">${c.e}</div><div class="ft">${c.n}</div>${c.x?`<div class="fe">"${c.x}"</div>`:''}</div></div></div><button class="splg" onclick="event.stopPropagation();speak(\`${c.e.replace(/`/g,"'")}\`)"><svg><use href="#is"/></svg></button>${fl?`<div class="fcl"><button class="fcb ba" onclick="fR(0)">🔄 Again</button><button class="fcb bk" onclick="fR(1)">✓ Know it</button></div>`:''}</div>`;
document.getElementById('p-cards').innerHTML=h;}
function fR(k){const c=dk[cI];if(k){fK++;S.fk[c.e]=true;}else{fA++;S.fk[c.e]=false;}sv();cI++;fl=false;rC();ub();}

// QUIZ
let qQ=[],qI=0,qS=0,qA=false;
function gQ(){const all=Object.values(V).flat(),s=sh([...all]);qQ=s.slice(0,10).map(q=>{const wr=sh(all.filter(w=>w.n!==q.n)).slice(0,3).map(w=>w.n);return{...q,o:sh([q.n,...wr])};});qI=0;qS=0;qA=false;rQ();}
function rQ(){let h=`<div class="pt">🧩 Quiz</div>`;
if(!qQ.length){h+=`<div class="card" style="text-align:center;padding:30px"><svg width="44" height="44" style="color:var(--g)"><use href="#ip"/></svg><h3 style="justify-content:center;margin-top:10px">Ready to test yourself?</h3><p style="margin:8px 0 16px;font-size:13px;color:var(--gr)">10 random questions from all decks</p><button class="qrb" onclick="gQ()">Start Quiz</button></div>`;document.getElementById('p-quiz').innerHTML=h;return;}
if(qI>=qQ.length){const pc=Math.round(qS/qQ.length*100),mg=pc>=80?"¡Excelente! 🌟":pc>=50?"¡Muy bien! 💪":"¡Sigue! 📚";h+=`<div class="qr"><svg width="44" height="44"><use href="#iy" style="color:var(--go)"/></svg><h2 style="margin-top:8px">${mg}</h2><div class="qbg">${qS}/${qQ.length}</div><p style="color:var(--gr)">${pc}%</p><button class="qrb" onclick="gQ()">New Quiz</button></div>`;document.getElementById('p-quiz').innerHTML=h;return;}
const q=qQ[qI],pr=qI/qQ.length*100;
h+=`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--gr);margin-bottom:4px"><span>Q ${qI+1}/10</span><span>Score: ${qS}</span></div><div class="qpb"><div class="qpf" style="width:${pr}%"></div></div></div>
<div class="qc2"><div class="ql">What does this mean?</div><div class="qw">${q.e} <button class="splg" style="width:34px;height:34px" onclick="speak(\`${q.e.replace(/`/g,"'")}\`)"><svg width="16" height="16"><use href="#is"/></svg></button></div><div class="qo">${q.o.map((o,i)=>`<button class="qob" id="q${i}" onclick="qR(${i},'${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div></div>`;
document.getElementById('p-quiz').innerHTML=h;}
function qR(i,a){if(qA)return;qA=true;const q=qQ[qI],ok=a===q.n;if(ok){qS++;S.qc++;}S.qt++;sv();document.getElementById('q'+i).classList.add(ok?'ok':'no');if(!ok)q.o.forEach((o,j)=>{if(o===q.n)document.getElementById('q'+j).classList.add('ok');});setTimeout(()=>{qI++;qA=false;rQ();ub();},ok?700:1400);}

// MORE
function rM(){let h=`<div class="pt">📋 More</div><div class="stb"><button class="st act" onclick="sM('sc',this)">Schedule</button><button class="st" onclick="sM('rs',this)">Resources</button><button class="st" onclick="sM('hn',this)">🇭🇳 Honduran</button><button class="st" onclick="sM('sg',this)">🎵 Songs</button></div>`;
// Schedule
h+=`<div class="msec act" id="m-sc"><div class="card hlg"><h3><svg width="16" height="16"><use href="#it"/></svg> 45 min/day</h3><p>Small blocks around naps & meals. 5/7 days = success.</p></div>
<div class="sbl"><div class="sbh">📅 Weekday</div>${[['7:00','Morning song + dress narration','5m','Together'],['7:30','Breakfast narration','5m','Together'],['9:00','Songs + video','10m','Together'],['10:00','Play in Spanish','10m','Together'],['1:00','Solo study (nap time)','15m','Solo'],['6:30','Bath/bedtime routine','5m','Together']].map(([t,a,d,w])=>`<div class="sr"><span class="stm">${t}</span><div class="sac"><strong>${a.split('—')[0]}</strong>${a.includes('—')?'—'+a.split('—')[1]:''}<br><span class="wb ${w==='Together'?'wt':'ws2'}">${w}</span></div><span class="sdr">${d}</span></div>`).join('')}</div>
<div class="sbl"><div class="sbh">🌞 Weekend Bonus</div>${[['AM','Extended play — cooking, art, nature','20m'],['Nap','Extra study, conversation, journal','25m'],['PM','Spanish show together','20m']].map(([t,a,d])=>`<div class="sr"><span class="stm">${t}</span><div class="sac">${a}</div><span class="sdr">${d}</span></div>`).join('')}</div>
<div class="card hly"><h3><svg width="16" height="16"><use href="#iw"/></svg> Rules</h3><ul><li><b>Never skip the morning song.</b></li><li><b>Narration ≠ study.</b> Just talk.</li><li><b>Miss a day?</b> Don't double up.</li><li><b>3 min of toddler attention</b> = win.</li></ul></div></div>`;
// Resources
h+=`<div class="msec" id="m-rs">${[['📱 Apps',[['Duolingo','Latin American Spanish, free tier'],['HelloTalk','Filter for Honduran partners'],['Tandem','Find conversation partners'],['Libby/Hoopla','Free w/ Indiana library card']]],['🎧 Audio',[['Language Transfer','90 eps, best free grammar'],['News in Slow Spanish','Weekly, LatAm edition'],['Hoy Hablamos','Daily 10-min, all Spanish']]],['📺 Toddler YouTube',[['Canticos','Bilingual nursery rhymes'],['El Reino Infantil','Huge song library'],['Peppa Pig en Español','Familiar stories'],['Pocoyó','Simple, originally Spanish']]],['📺 Parent YouTube',[['Dreaming Spanish','Comprehensible input, all levels'],['Spanish with Paul','Clear grammar videos'],['Español con Juan','1001 palabras series'],['Destinos','52-ep telenovela, free']]],['🌐 Websites',[['SpanishDict.com','Best free dictionary'],['ConversationExchange','Free partners'],['BBC Mundo','News in Spanish'],['Indiana Library','Bilingual books, events']]]].map(([cat,items])=>`<div style="margin-bottom:16px"><h3 style="font-size:15px;font-weight:700;margin-bottom:8px">${cat}</h3><div class="rg">${items.map(([n,d])=>`<div class="ri"><div class="ric" style="background:var(--gl)">📗</div><div><div class="rn">${n}</div><div class="rd">${d}</div></div></div>`).join('')}</div></div>`).join('')}</div>`;
// Honduran
h+=`<div class="msec" id="m-hn"><div class="card hly"><h3>🇭🇳 Honduran Spanish</h3><p>Very close to standard LatAm. Add these local flavors.</p></div>
<div class="card"><h3>🗣 Pronunciation</h3><ul><li><b>S-aspiration:</b> "Estamos" → "ehtamoh"</li><li><b>Vos:</b> hablás, comés, vivís</li><li><b>No "th":</b> Gracias = grah-see-ahs</li></ul></div>
<div class="card"><h3>🇭🇳 Expressions</h3>${[["¡Buenas!","Hi!"],["¡Qué onda!","What's up!"],["Catracho","Honduran"],["Pisto","Money"],["Cipote","Kid"],["Maje","Dude"],["Puchica","Wow"],["Cheque","Okay"],["¡Va pues!","Alright!"],["Alero","Friend"],["Jalar","To leave"],["¡Ideay!","So?/Well?"]].map(([a,b])=>`<div class="vp"><span class="ve">${a} ${spB(a)}</span><span class="vn">${b}</span></div>`).join('')}</div>
<div class="card"><h3>🍳 Food</h3>${[["Baleada","Tortilla+beans+cheese"],["Tajadas","Fried plantains"],["Sopa de caracol","Conch soup"],["Atol de elote","Corn drink"],["Licuado","Smoothie"],["Horchata","Rice drink"]].map(([a,b])=>`<div class="vp"><span class="ve">${a} ${spB(a)}</span><span class="vn">${b}</span></div>`).join('')}</div>
<div class="card"><h3>🎵 Music</h3><ul><li><b>Guillermo Anderson</b> — "En Mi País"</li><li><b>Punta</b> — Banda Blanca, Kazzabe</li><li><b>Polache</b> — comedian/singer</li></ul></div></div>`;
// Songs
h+=`<div class="msec" id="m-sg"><div class="card"><h3>🎵 Essential Songs</h3><p style="font-size:12px;color:var(--gr);margin-bottom:8px">Tap to hear. Search YouTube for full versions.</p>${[["Buenos Días","Mo 1"],["Los Pollitos Dicen","Mo 1–2"],["Pin Pon","Mo 2"],["Cabeza Hombros Rodillas Pies","Mo 2–3"],["Estrellita ¿Dónde Estás?","Mo 3"],["Arroz con Leche","Mo 4"],["La Araña Pequeñita","Mo 4"],["La Vaca Lola","Mo 5"],["Un Elefante Se Balanceaba","Mo 6"],["De Colores","Mo 7+"]].map(([n,w])=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--grl)"><div><div style="font-weight:700;font-size:13.5px">${n} ${spB(n)}</div><div style="font-size:11px;color:var(--gr)">${w}</div></div></div>`).join('')}</div></div>`;
document.getElementById('p-more').innerHTML=h;}
function sM(id,b){document.querySelectorAll('.msec').forEach(s=>s.classList.remove('act'));document.getElementById('m-'+id).classList.add('act');b.parentElement.querySelectorAll('.st').forEach(x=>x.classList.remove('act'));b.classList.add('act');}

// INIT
rH();rL();dk=sh([...V[cD]]);rC();rQ();rM();
</script>
</body>
</html>
